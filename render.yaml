services:
  - type: web
    name: erp-backend-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:5000
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: erp-database
          property: connectionString
      - key: JwtSettings__SecretKey
        generateValue: true
      - key: JwtSettings__Issuer
        value: ERPBackend
      - key: JwtSettings__Audience
        value: ERPFrontend
      - key: JwtSettings__ExpirationInHours
        value: 24

databases:
  - name: erp-database
    databaseName: erp_db
    user: erp_user
    plan: starter