services:
  - type: web
    name: erp-backend
    env: dotnet
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/ERPBackend.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: erp-postgres
=======
    name: erp-backend-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:5000
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: erp-database
          property: connectionString
      - key: JwtSettings__SecretKey
        generateValue: true
      - key: JwtSettings__Issuer
        value: ERPBackend
      - key: JwtSettings__Audience
        value: ERPFrontend
      - key: JwtSettings__ExpirationHours
        value: 24
      - key: CorsOrigins__0
        value: https://your-app-name.vercel.app
      - key: CorsOrigins__1
        value: http://localhost:3000

databases:
  - name: erp-postgres
    databaseName: erp_db
    user: erp_user
